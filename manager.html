<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manager Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dash-box">
        <div class="header">
            <div>
                <h2>Welcome, Manager</h2>
                <div style="font-size: 14px; color: #666;">
                    Designation: <strong>Operations Manager</strong>
                </div>
            </div>
            <div>
                <span class="badge badge-manager">Manager</span>
                <a href="/login.html" class="logout-link" style="margin-left: 15px;">Log Out</a>
            </div>
        </div>

        <div class="section">
            <h4>Pending Approvals</h4>
            <ul>
                <li style="margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; width: 400px;">
                    <span>Rayan Leave Request</span>
                    <button class="mini-btn" onclick="alert('Approved Rayan leave')">Approve</button>
                </li>
                <li style="margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; width: 400px;">
                    <span>Annual Leave Request (Kanishk)</span>
                    <button class="mini-btn" onclick="alert('Approved Kanishk leave')">Approve</button>
                </li>
            </ul>
        </div>

        <div class="section">
            <h4>Team Overview</h4>
            <ul>
                <li>Attendance: 84.5%</li>
                <li>Tasks Done: 28 / 32</li>
                <li>Active Projects: 3</li>
            </ul>
        </div>

        <div class="section">
            <h4>Actions</h4>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="mini-btn" onclick="alert('Downloading report...')">Download Monthly Report</button>
                <button class="mini-btn" onclick="alert('Opening schedule...')">View Team Schedule</button>
            </div>
        </div>
    </div>

</body>
</html>
