<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <h2>Corporate Login</h2>
        
        <!-- Error banner, hidden by default -->
        <div id="error-box" class="error-box">
            Invalid username or password. Please try again.
        </div>

        <!-- Submission goes to the backend at /login -->
        <form action="/login" method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter Username" required>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter Password" required>
            </div>
            
            <button type="submit" class="btn">Log In</button>
        </form>

        <!-- Notice showing credentials for testing -->
        <div style="margin-top: 20px; font-size: 12px; color: #666; border-top: 1px solid #eee; padding-top: 10px;">
            <strong>Mock Credentials for Testing:</strong><br>
            admin / admin123 (Admin)<br>
            manager / manager123 (Manager)<br>
            employee / employee123 (Employee)
        </div>
    </div>

    <!-- Basic script to show the error message if the server redirects with ?error=1 -->
    <script>
        var urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('error') === '1') {
            document.getElementById('error-box').style.display = 'block';
        }
    </script>

</body>
</html>
