<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-container">
        <!-- Header Section -->
        <div class="header">
            <div>
                <h2>Welcome,</h2>
                <div style="font-size: 14px; color: #666;">
                    Designation: <strong>Lead System Administrator</strong>
                </div>
            </div>
            <div>
                <span class="badge badge-admin">Admin</span>
                <a href="/login.html" class="logout-link" style="margin-left: 15px;">Log Out</a>
            </div>
        </div>

        <!-- System Health Section -->
        <div class="section">
            <h4>System Health Status</h4>
            <ul>
                <li>Server Load: 12% (Normal)</li>
                <li>Server Memory Usage: 42% (Normal)</li>
                <li>Status: Online</li>
            
            </ul>
        </div>

        <!-- Active Users Section -->
        <div class="section">
            <h4>Active Logins</h4>
            <ul>
                <li>Khush (Online)</li>
                <li>Rayan (Away)</li>
                <li>Kanishk(Offline)</li>
            </ul>
        </div>

        <!-- Administrative Controls Section -->
        <div class="section">
            <h4>Administrative Controls</h4>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="action-btn" onclick="alert('Starting backup...')">Backup Database</button>
                <button class="action-btn" onclick="alert('Reloading database...')">Reload Database</button>
                <button class="action-btn" onclick="alert('Putting server into maintenance...')">Maintenance Mode</button>
            </div>
        </div>
    </div>

</body>
</html>
